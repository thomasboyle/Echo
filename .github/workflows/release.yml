name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          cd echo
          VER=$(node -e "const c=require('./src-tauri/tauri.conf.json'); const v=c.version.split('.'); v[2]=String(Number(v[2])+1); console.log(v.join('.'))")
          echo "version=$VER" >> $GITHUB_OUTPUT
          VER="$VER" node -e "
          const fs = require('fs');
          const ver = process.env.VER;
          const tauri = require('./src-tauri/tauri.conf.json');
          tauri.version = ver;
          fs.writeFileSync('./src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2) + '\n');
          const pkg = require('./package.json');
          pkg.version = ver;
          fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          sed -i "s/^version = .*/version = \"$VER\"/" src-tauri/Cargo.toml
          cd ..

      - name: Commit and push version bump
        run: |
          cd echo
          VER="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml package.json
          git diff --staged --quiet || git commit -m "chore: bump version to $VER"
          git push
          cd ..

  build-release:
    needs: version-bump
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Inject GitHub repo into updater endpoint
        working-directory: echo
        run: node -e "const fs=require('fs'); const p='src-tauri/tauri.conf.json'; let s=fs.readFileSync(p,'utf8'); s=s.replace('__GITHUB_REPO__','${{ github.repository }}'); fs.writeFileSync(p,s);"

      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: echo/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: echo
        run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: Echo v__VERSION__
          releaseBody: See the assets below to download and install.
          releaseDraft: false
          prerelease: false
          projectPath: echo
          args: ${{ matrix.args }}
